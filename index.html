<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلّم الإنجليزية — A1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal-900:#0f3d3a;
  --teal-700:#1f6f68;
  --teal-500:#2f9188;
  --teal-100:#e4f2ef;
  --sand-100:#faf6ee;
  --sand-200:#f1e9d6;
  --coral:#e8795a;
  --coral-light:#fbe4dc;
  --ink:#1c2624;
  --muted:#5c6d69;
  --white:#ffffff;
  --ok:#2f9188;
  --bad:#d1554a;
  --radius:18px;
  --shadow: 0 10px 30px -12px rgba(15,61,58,.18);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Tajawal','Poppins',sans-serif;
  background:var(--sand-100);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.en{font-family:'Poppins','Tajawal',sans-serif; direction:ltr; unicode-bidi:isolate;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--teal-100);}

/* ---------- App Shell ---------- */
#app{display:flex; min-height:100vh;}
.sidebar{
  width:240px; background:var(--teal-900); color:var(--sand-100);
  padding:28px 18px; display:flex; flex-direction:column; gap:6px;
  position:sticky; top:0; height:100vh; flex-shrink:0;
}
.brand{display:flex; align-items:center; gap:10px; padding:0 8px 22px; }
.brand .mark{width:38px; height:38px; border-radius:12px; background:var(--coral); display:flex; align-items:center; justify-content:center; font-weight:800; font-family:'Poppins'; color:#fff; font-size:18px;}
.brand h1{font-size:17px; font-weight:800;}
.brand span{display:block; font-size:11px; color:#9fc7c1; font-weight:500;}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px;
  background:transparent; border:none; color:#cfe6e2; font-size:15px; font-weight:500;
  text-align:right; transition:.18s;
}
.nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.active{background:var(--teal-700); color:#fff;}
.nav-item .ic{font-size:18px; width:22px; text-align:center;}
.sidebar-foot{margin-top:auto; padding:14px 8px; font-size:12px; color:#7fa39d;}

main{flex:1; min-width:0; padding:34px 40px 90px; max-width:1100px; margin:0 auto; width:100%;}

/* mobile bottom nav */
.bottom-nav{display:none;}
@media (max-width:880px){
  .sidebar{display:none;}
  main{padding:20px 16px 90px;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--teal-900);
    justify-content:space-around; padding:8px 4px 10px; z-index:50; box-shadow:0 -6px 20px rgba(0,0,0,.15);
  }
  .bottom-nav button{background:none; border:none; color:#9fc7c1; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; font-weight:600; padding:4px 6px;}
  .bottom-nav button.active{color:#fff;}
  .bottom-nav .ic{font-size:19px;}
}

/* ---------- Reusable ---------- */
.section-title{font-size:26px; font-weight:800; margin-bottom:6px;}
.section-sub{color:var(--muted); font-size:14.5px; margin-bottom:26px;}
.card{background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px;}
.pill{display:inline-flex; align-items:center; gap:6px; background:var(--teal-100); color:var(--teal-700); font-size:12.5px; font-weight:700; padding:5px 12px; border-radius:100px;}
.btn{border:none; border-radius:12px; padding:12px 22px; font-weight:700; font-size:14.5px; transition:.15s;}
.btn-primary{background:var(--coral); color:#fff;}
.btn-primary:hover{filter:brightness(1.06); transform:translateY(-1px);}
.btn-ghost{background:var(--teal-100); color:var(--teal-700);}
.btn-ghost:hover{background:#d6ebe7;}
.btn:disabled{opacity:.45; cursor:not-allowed; transform:none;}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Home ---------- */
.hero{
  background:linear-gradient(135deg, var(--teal-900), var(--teal-700));
  border-radius:24px; padding:36px 32px; color:#fff; position:relative; overflow:hidden;
  display:flex; align-items:center; gap:30px; flex-wrap:wrap;
}
.hero::after{content:""; position:absolute; inset:0; background:radial-gradient(circle at 85% 20%, rgba(232,121,90,.35), transparent 55%);}
.hero-ring{position:relative; z-index:1; flex-shrink:0;}
.hero-text{position:relative; z-index:1; flex:1; min-width:220px;}
.hero-text h2{font-size:24px; font-weight:800; margin-bottom:8px;}
.hero-text p{color:#cfe6e2; font-size:14.5px; margin-bottom:18px; line-height:1.9;}
.ring-wrap{width:132px; height:132px; position:relative;}
.ring-num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.ring-num b{font-size:26px; font-family:'Poppins';}
.ring-num span{font-size:11px; color:#cfe6e2;}

.stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:26px 0;}
.stat{background:#fff; border-radius:16px; padding:18px; box-shadow:var(--shadow); text-align:center;}
.stat b{display:block; font-size:24px; color:var(--teal-700); font-family:'Poppins'; font-weight:800;}
.stat span{font-size:12.5px; color:var(--muted);}

.day-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
.day-tile{
  background:#fff; border-radius:14px; padding:16px 14px; text-align:right; box-shadow:var(--shadow);
  border:2px solid transparent; transition:.15s; position:relative;
}
.day-tile:hover{transform:translateY(-3px);}
.day-tile.locked{opacity:.5; filter:grayscale(.4);}
.day-tile.done{border-color:var(--teal-500);}
.day-tile .num{font-family:'Poppins'; font-weight:800; font-size:22px; color:var(--teal-700);}
.day-tile .topic{font-size:12.5px; color:var(--muted); margin-top:2px; min-height:32px;}
.day-tile .chk{position:absolute; top:10px; left:10px; font-size:15px; color:var(--teal-500);}
.day-tile button{width:100%; margin-top:10px;}

/* ---------- Flashcards ---------- */
.fc-wrap{max-width:560px; margin:0 auto;}
.fc-progress{height:6px; background:var(--sand-200); border-radius:10px; overflow:hidden; margin-bottom:22px;}
.fc-progress i{display:block; height:100%; background:var(--coral); transition:.3s;}
.flashcard{
  background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:34px 28px; min-height:340px;
  display:flex; flex-direction:column; justify-content:center; position:relative; cursor:pointer;
}
.flashcard .side-label{position:absolute; top:16px; right:20px; font-size:11px; color:var(--muted); font-weight:700;}
.fc-en{font-family:'Poppins'; font-size:24px; font-weight:700; direction:ltr; text-align:center; line-height:1.5;}
.fc-pron{direction:ltr; text-align:center; color:var(--teal-700); font-size:14px; margin-top:10px;}
.fc-hint{text-align:center; color:var(--muted); font-size:12.5px; margin-top:22px;}
.fc-back .ar-block{text-align:center; margin-bottom:16px;}
.fc-back .ar-label{font-size:11px; color:var(--muted); font-weight:700; margin-bottom:4px;}
.fc-back .ar-text{font-size:19px; font-weight:700;}
.fc-back .darija{color:var(--teal-700);}
.fc-back .example{background:var(--sand-200); border-radius:12px; padding:12px 14px; margin-top:8px; font-size:13.5px; direction:ltr; text-align:center; color:var(--ink);}
.fc-controls{display:flex; justify-content:center; gap:12px; margin-top:22px;}
.audio-btn{
  background:var(--teal-100); border:none; width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:17px; color:var(--teal-700); flex-shrink:0;
}
.audio-btn:hover{background:#d6ebe7;}
.fc-nav{display:flex; justify-content:space-between; align-items:center; margin-top:20px;}
.fc-dots{display:flex; gap:5px; flex-wrap:wrap; justify-content:center; margin-top:16px;}
.fc-dots span{width:7px; height:7px; border-radius:50%; background:var(--sand-200); display:inline-block;}
.fc-dots span.on{background:var(--coral);}

/* ---------- Quiz ---------- */
.quiz-wrap{max-width:560px; margin:0 auto;}
.q-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
.q-score{font-size:13px; font-weight:700; color:var(--teal-700);}
.q-card{background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:26px;}
.q-type{font-size:11.5px; font-weight:700; color:var(--coral); margin-bottom:10px;}
.q-prompt{font-size:17px; font-weight:700; margin-bottom:20px; line-height:1.7;}
.q-prompt.en{direction:ltr; text-align:right;}
.opt-list{display:flex; flex-direction:column; gap:10px;}
.opt{
  background:var(--sand-100); border:2px solid var(--sand-200); border-radius:12px; padding:13px 16px;
  text-align:right; font-size:14.5px; font-weight:600; transition:.15s;
}
.opt:hover{border-color:var(--teal-500);}
.opt.correct{background:var(--teal-100); border-color:var(--ok); color:var(--teal-900);}
.opt.wrong{background:var(--coral-light); border-color:var(--bad); color:#7c2a20;}
.word-bank, .word-slots{display:flex; flex-wrap:wrap; gap:8px; direction:ltr;}
.word-slots{min-height:46px; background:var(--sand-100); border-radius:12px; padding:8px; margin-bottom:14px; border:2px dashed var(--sand-200);}
.word-chip{background:var(--teal-100); color:var(--teal-700); border:none; padding:9px 14px; border-radius:10px; font-weight:700; font-size:14px; font-family:'Poppins';}
.word-chip:hover{background:#d6ebe7;}
.text-input{width:100%; border:2px solid var(--sand-200); border-radius:12px; padding:13px 14px; font-size:15px; font-family:'Tajawal'; margin-bottom:14px;}
.text-input:focus{outline:none; border-color:var(--teal-500);}
.feedback{border-radius:12px; padding:12px 14px; font-size:13.5px; font-weight:600; margin-top:14px;}
.feedback.ok{background:var(--teal-100); color:var(--teal-900);}
.feedback.bad{background:var(--coral-light); color:#7c2a20;}
.q-actions{display:flex; justify-content:space-between; margin-top:20px;}

.result-card{text-align:center; padding:40px 26px;}
.result-card .big{font-size:46px; font-weight:800; font-family:'Poppins'; color:var(--teal-700);}
.result-card p{color:var(--muted); margin:8px 0 22px;}

/* ---------- Lessons list ---------- */
.lesson-row{display:flex; align-items:center; gap:16px; background:#fff; border-radius:16px; padding:16px 18px; box-shadow:var(--shadow); margin-bottom:12px;}
.lesson-row .badge{width:44px; height:44px; border-radius:12px; background:var(--teal-100); color:var(--teal-700); display:flex; align-items:center; justify-content:center; font-weight:800; font-family:'Poppins'; flex-shrink:0;}
.lesson-row .badge.done{background:var(--teal-500); color:#fff;}
.lesson-row .info{flex:1; min-width:0;}
.lesson-row .info b{display:block; font-size:15px;}
.lesson-row .info span{font-size:12.5px; color:var(--muted);}

/* ---------- Grammar ---------- */
.gram-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px;}
.gram-tile{background:#fff; border-radius:16px; padding:18px; box-shadow:var(--shadow); text-align:right; border:2px solid transparent;}
.gram-tile:hover{border-color:var(--teal-500); transform:translateY(-2px);}
.gram-tile .ic{font-size:24px; margin-bottom:8px;}
.gram-tile b{display:block; font-size:15px; margin-bottom:3px;}
.gram-tile span{font-size:12px; color:var(--muted);}
.gram-detail .block{margin-bottom:22px;}
.gram-detail h3{font-size:15px; font-weight:800; color:var(--teal-700); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
.gram-detail p{font-size:14.5px; line-height:2; color:var(--ink);}
.ex-line{background:var(--sand-100); border-radius:10px; padding:10px 14px; margin-bottom:8px; font-size:14px;}
.ex-line .e{direction:ltr; font-family:'Poppins'; font-weight:600; display:block;}
.ex-line .a{color:var(--muted); font-size:13px;}
.note-box{background:var(--teal-100); border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.9;}
.mistake-box{background:var(--coral-light); border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.9;}

.back-link{display:inline-flex; align-items:center; gap:6px; color:var(--teal-700); font-weight:700; font-size:13.5px; margin-bottom:18px; background:none; border:none;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}

@media (max-width:520px){
  .hero{flex-direction:column; text-align:center;}
  .stat-row{grid-template-columns:1fr 1fr; }
}
</style>
</head>

let STATE = {
  view:"home",
  day:1,
  fcIndex:0,
  fcFlipped:false,
  quizDay:null,
  quizQuestions:[],

  quizScore:0,

};

async function loadProgress(){
  try{
    const r = await window.storage.get('progress', false);
    if(r && r.value){ STATE.progress = JSON.parse(r.value); }
  }catch(e){ /* no saved progress yet */ }
  render();
}
async function saveProgress(){
  try{ await window.storage.set('progress', JSON.stringify(STATE.progress), false); }catch(e){}
}

/* =================== UTIL =================== */
function speak(text){
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function normalizeAr(s){ return s.replace(/[\u064B-\u065F\u0670]/g,'').replace(/[إأآا]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي').trim().toLowerCase(); }
function goto(view, extra){ STATE.view=view; Object.assign(STATE, extra||{}); window.scrollTo(0,0); render(); }
function isDayUnlocked(i){ return i===0 || STATE.progress.completedDays.includes(i-1) || STATE.progress.completedDays.includes(i); }

/* =================== QUIZ GENERATION =================== */
function buildQuizForDay(dayIdx){
  const sentences = DAYS[dayIdx].sentences;
  const types = ["mcq","order","write"];
  const qs = sentences.map((s,i)=>{
    const type = types[i % 3];
    if(type==="mcq"){
      const distractors = shuffle(sentences.filter((_,j)=>j!==i)).slice(0,3).map(x=>x[1]);
      const opts = shuffle([s[1], ...distractors]);
      return {type, en:s[0], correctText:s[1], opts, correctIndex:opts.indexOf(s[1]), pron:s[3]};
    } else if(type==="order"){
      const words = s[0].replace(/[.,?!]/g,'').split(' ');
      return {type, en:s[0], ar:s[1], words: shuffle(words), correctWords: words};
    } else {
      return {type, en:s[0], ar:s[1], darija:s[2]};
    }
  });
  return qs;
}

}

    <div class="section-sub">اختر يوماً لعرض بطاقاته العشر</div>
    <div class="day-grid">
      ${DAYS.map((d,i)=>{
        const unlocked = isDayUnlocked(i);
        return `<div class="day-tile ${!unlocked?'locked':''}">
          <div class="num">${i+1}</div><div class="topic">${d.t}</div>
          <button class="btn btn-ghost" style="font-size:12px; padding:8px 10px;" ${!unlocked?'disabled':''} data-fc="${i}">فتح البطاقات</button>
        </div>`;
      }).join('')}
    </div>
  `;
  main.querySelectorAll('[data-fc]').forEach(b=>b.addEventListener('click', ()=>goto('flashcards-day',{day:parseInt(b.dataset.fc), fcIndex:0, fcFlipped:false})));
}

function renderFlashcardDay(main){

    </div>
    <div class="fc-wrap">
      <div class="fc-progress"><i style="width:${pct}%"></i></div>
      <div class="flashcard" id="flipCard">
        ${!STATE.fcFlipped ? `
          <span class="side-label">EN</span>
          <div class="fc-en">${s[0]}</div>
          <div class="fc-pron">${s[3]}</div>
          <div class="fc-hint">👆 اضغط لرؤية الترجمة</div>
        ` : `
          <div class="fc-back">
            <span class="side-label">AR</span>
            <div class="ar-block"><div class="ar-label">بالفصحى</div><div class="ar-text">${s[1]}</div></div>

            <div class="example"><b>مثال إضافي:</b><br>${s[4]}</div>
          </div>
        `}
      </div>
      <div class="fc-controls">
        <button class="audio-btn" id="audioBtn" title="استمع للنطق">🔊</button>
      </div>
      <div class="fc-dots">${day.sentences.map((_,i)=>`<span class="${i===STATE.fcIndex?'on':''}"></span>`).join('')}</div>
      <div class="fc-nav">
        <button class="btn btn-ghost" id="prevBtn" ${STATE.fcIndex===0?'disabled':''}>◀ السابقة</button>
        ${STATE.fcIndex===9 ?
          `<button class="btn btn-primary" id="toQuizBtn">اذهب للاختبار 📝</button>` :
          `<button class="btn btn-primary" id="nextBtn">التالية ▶</button>`}
      </div>
    </div>
  `;
  main.querySelector('#backBtn').addEventListener('click', ()=>goto('lessons'));
  main.querySelector('#flipCard').addEventListener('click', ()=>{ STATE.fcFlipped=!STATE.fcFlipped; render(); });
  main.querySelector('#audioBtn').addEventListener('click', (e)=>{ e.stopPropagation(); speak(s[0]); });
  const prev = main.querySelector('#prevBtn');
  if(prev) prev.addEventListener('click', ()=>{ STATE.fcIndex--; STATE.fcFlipped=false; render(); });
  const next = main.querySelector('#nextBtn');
  if(next) next.addEventListener('click', ()=>{ STATE.fcIndex++; STATE.fcFlipped=false; render(); });
  const toQuiz = main.querySelector('#toQuizBtn');
  if(toQuiz) toQuiz.addEventListener('click', ()=> startQuiz(STATE.day));

/* ---------- Quizzes ---------- */
function renderQuizzesHub(main){
  main.innerHTML = `
    <div class="section-title">الاختبارات والنتائج</div>
    <div class="section-sub">اختبر نفسك بعد إنهاء بطاقات كل يوم</div>
    ${DAYS.map((d,i)=>{
      const unlocked = isDayUnlocked(i);
      const score = STATE.progress.dayScores[i];
      return `<div class="lesson-row" style="${!unlocked?'opacity:.5':''}">
        <div class="badge ${score!==undefined?'done':''}">${i+1}</div>
        <div class="info"><b>${d.t}</b><span>${score!==undefined?'نتيجتك: '+score+'/10':'لم تُجرِ الاختبار بعد'}</span></div>
        <button class="btn btn-primary" ${!unlocked?'disabled':''} data-quiz="${i}">${score!==undefined?'أعد الاختبار':'ابدأ الاختبار'}</button>
      </div>`;
    }).join('')}
  `;
  main.querySelectorAll('[data-quiz]').forEach(b=>b.addEventListener('click', ()=>startQuiz(parseInt(b.dataset.quiz))));
}

function startQuiz(dayIdx){
  STATE.quizDay = dayIdx;
  STATE.quizQuestions = buildQuizForDay(dayIdx);
  STATE.quizIndex = 0;
  STATE.quizScore = 0;
  STATE.quizAnswered = false;
  goto('quiz-run');
}

function renderQuizRun(main){
  const q = STATE.quizQuestions[STATE.quizIndex];
  const total = STATE.quizQuestions.length;
  let bodyHtml = '';
  if(q.type==='mcq'){
    bodyHtml = `
      <div class="q-type">اختر الترجمة الصحيحة</div>
      <div class="q-prompt en">${q.en}</div>
      <div class="opt-list" id="optList">
        ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}
      </div>
      <div id="fb"></div>
    `;
  } else if(q.type==='order'){
    bodyHtml = `
      <div class="q-type">رتّب الكلمات لتكوين الجملة الصحيحة</div>
      <div class="q-prompt">${q.ar}</div>
      <div class="word-slots" id="slots"></div>
      <div class="word-bank" id="bank">${q.words.map((w,i)=>`<button class="word-chip" data-w="${w}" data-i="${i}">${w}</button>`).join('')}</div>
      <div id="fb"></div>
    `;
  } else {
    bodyHtml = `
      <div class="q-type">اكتب الترجمة بالعربية (فصحى أو دارجة)</div>
      <div class="q-prompt en">${q.en}</div>
      <input type="text" class="text-input" id="writeInput" placeholder="اكتب الترجمة هنا...">
      <button class="btn btn-primary" id="checkWrite">تحقق</button>
      <div id="fb"></div>
    `;
  }
  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="q-head">
        <button class="back-link" id="backBtn" style="margin:0;">→ خروج</button>
        <span class="q-score">السؤال ${STATE.quizIndex+1} من ${total} · النقاط: ${STATE.quizScore}</span>
      </div>
      <div class="fc-progress"><i style="width:${((STATE.quizIndex)/total)*100}%"></i></div>
      <div class="q-card" style="margin-top:16px;">
        ${bodyHtml}
        <div class="q-actions">
          <button class="audio-btn" id="qAudio">🔊</button>
          <button class="btn btn-primary" id="nextQ" style="display:none;">${STATE.quizIndex===total-1?'إنهاء الاختبار':'السؤال التالي'} ▶</button>
        </div>
      </div>
    </div>
  `;
  main.querySelector('#backBtn').addEventListener('click', ()=>goto('quizzes'));
  main.querySelector('#qAudio').addEventListener('click', ()=>speak(q.en));

  if(q.type==='mcq'){
    main.querySelectorAll('#optList .opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(STATE.quizAnswered) return;
        STATE.quizAnswered = true;
        const i = parseInt(btn.dataset.i);
        const correct = i===q.correctIndex;
        if(correct) STATE.quizScore++;
        main.querySelectorAll('#optList .opt').forEach((o,idx)=>{
          if(idx===q.correctIndex) o.classList.add('correct');
          else if(idx===i && !correct) o.classList.add('wrong');
        });
        showFeedback(main, correct, q.correctText);
        main.querySelector('#nextQ').style.display='block';
      });
    });
  } else if(q.type==='order'){
    const slots = main.querySelector('#slots');
    const chosen = [];
    function refreshBank(){
      main.querySelectorAll('#bank .word-chip').forEach(c=>{
        c.style.display = chosen.includes(c.dataset.i) ? 'none' : 'inline-block';
      });
    }
    main.querySelectorAll('#bank .word-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        if(STATE.quizAnswered) return;
        chosen.push(chip.dataset.i);
        const span = document.createElement('button');
        span.className='word-chip'; span.textContent = chip.dataset.w;
        span.addEventListener('click', ()=>{
          if(STATE.quizAnswered) return;
          const idx = chosen.indexOf(chip.dataset.i);
          if(idx>-1) chosen.splice(idx,1);
          span.remove(); refreshBank();
        });
        slots.appendChild(span);
        refreshBank();
        if(chosen.length===q.words.length){
          STATE.quizAnswered = true;
          const built = chosen.map(i=>q.words[i]).join(' ');
          const correct = built.toLowerCase()===q.correctWords.join(' ').toLowerCase();
          if(correct) STATE.quizScore++;
          showFeedback(main, correct, q.correctWords.join(' '));
          main.querySelector('#nextQ').style.display='block';
        }
      });
    });
  } else {
    main.querySelector('#checkWrite').addEventListener('click', ()=>{
      if(STATE.quizAnswered) return;
      STATE.quizAnswered = true;
      const val = normalizeAr(main.querySelector('#writeInput').value);
      const correct = val.length>0 && (normalizeAr(q.ar).includes(val) || val.includes(normalizeAr(q.ar).slice(0,4)) || normalizeAr(q.darija).includes(val));
      const exact = normalizeAr(val)===normalizeAr(q.ar) || normalizeAr(val)===normalizeAr(q.darija);
      const ok = exact || correct;
      if(ok) STATE.quizScore++;
      showFeedback(main, ok, q.ar + ' / ' + q.darija);
      main.querySelector('#nextQ').style.display='block';
      main.querySelector('#checkWrite').disabled = true;
    });
  }

  const nextBtn = main.querySelector('#nextQ');
  nextBtn.addEventListener('click', ()=>{
    if(STATE.quizIndex < total-1){
      STATE.quizIndex++;
      STATE.quizAnswered = false;
      render();
    } else {
      finishQuiz();
    }
  });
}

function showFeedback(main, correct, correctText){
  const fb = main.querySelector('#fb');
  fb.innerHTML = `<div class="feedback ${correct?'ok':'bad'}">${correct?'✅ إجابة صحيحة! أحسنت.':'❌ إجابة غير صحيحة. الصحيح هو: '}${!correct?correctText:''}</div>`;
}

function finishQuiz(){
  const d = STATE.quizDay;
  const prevBest = STATE.progress.dayScores[d] || 0;
  STATE.progress.dayScores[d] = Math.max(prevBest, STATE.quizScore);
  if(STATE.quizScore >= 6 && !STATE.progress.completedDays.includes(d)){
    STATE.progress.completedDays.push(d);
  }
  saveProgress();
  goto('quiz-result');
}

function renderQuizResult(main){
  const total = STATE.quizQuestions.length;
  const pct = Math.round((STATE.quizScore/total)*100);
  const passed = STATE.quizScore>=6;
  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="q-card result-card">
        <div style="font-size:44px;">${passed?'🎉':'💪'}</div>
        <div class="big">${STATE.quizScore}/${total}</div>
        <p>${passed? 'أحسنت! لقد أكملت اليوم '+(STATE.quizDay+1)+' بنجاح ('+pct+'%)' : 'نتيجة جيدة، حاول المراجعة مرة أخرى لتحسين نتيجتك ('+pct+'%)'}</p>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
          <button class="btn btn-ghost" id="retryBtn">إعادة الاختبار</button>
          <button class="btn btn-primary" id="homeBtn">${passed && STATE.quizDay<29 ? 'الانتقال لليوم التالي' : 'العودة للرئيسية'}</button>
        </div>
      </div>
    </div>
  `;
  main.querySelector('#retryBtn').addEventListener('click', ()=>startQuiz(STATE.quizDay));
  main.querySelector('#homeBtn').addEventListener('click', ()=>{
    if(passed && STATE.quizDay<29) goto('flashcards-day',{day:STATE.quizDay+1, fcIndex:0, fcFlipped:false});
    else goto('home');
  });
}

/* ---------- Grammar ---------- */
function renderGrammarHub(main){
  main.innerHTML = `
    <div class="section-title">القواعد — Grammar</div>
    <div class="section-sub">شرح مفصّل لقواعد مستوى A1 مع أمثلة وأخطاء شائعة واختبار بعد كل درس</div>
    <div class="gram-grid">
      ${GRAMMAR.map(g=>{
        const done = STATE.progress.gramDone.includes(g.id);
        return `<button class="gram-tile" data-g="${g.id}">
          <div class="ic">${g.ic}</div><b>${g.title}</b><span>${done?'✅ مكتمل':'اضغط للدراسة'}</span>
        </button>`;
      }).join('')}
    </div>
  `;
  main.querySelectorAll('[data-g]').forEach(b=>b.addEventListener('click', ()=>goto('grammar-detail',{gramId:b.dataset.g})));
}

function renderGrammarDetail(main){
  const g = GRAMMAR.find(x=>x.id===STATE.gramId);
  main.innerHTML = `
    <button class="back-link" id="backBtn">→ رجوع للقواعد</button>
    <div class="section-title">${g.ic} ${g.title}</div>
    <div class="card gram-detail">
      <div class="block">
        <h3>📘 الشرح المبسّط</h3>
        <p>${g.explain}</p>
      </div>
      <div class="block">
        <h3>✏️ أمثلة</h3>
        ${g.examples.map(e=>`<div class="ex-line"><span class="e">${e[0]}</span><span class="a">${e[1]}</span></div>`).join('')}
      </div>
      <div class="block">
        <h3>💡 ملاحظات مهمة</h3>
        <div class="note-box">${g.notes}</div>
      </div>
      <div class="block">
        <h3>⚠️ أخطاء شائعة</h3>
        <div class="mistake-box">${g.mistakes}</div>
      </div>
      <button class="btn btn-primary" id="startGramQuiz">ابدأ اختبار الدرس 📝</button>
    </div>
  `;
  main.querySelector('#backBtn').addEventListener('click', ()=>goto('grammar'));
  main.querySelector('#startGramQuiz').addEventListener('click', ()=>startGrammarQuiz(g));
}

function startGrammarQuiz(g){
  STATE.quizQuestions = g.quiz.map(item=>({type:'gmcq', q:item.q, opts:item.opts, correctIndex:item.a}));
  STATE.quizDay = 'gram-'+g.id;
  STATE.quizIndex = 0;
  STATE.quizScore = 0;
  STATE.quizAnswered = false;
  STATE.gramId = g.id;
  goto('quiz-run-gram');
}

// extend render for grammar quiz
const _origRender = render;
render = function(){
  const app = document.getElementById('app');
  _origRender.call(this);
  if(STATE.view==='quiz-run-gram'){
    renderGrammarQuizRun(document.getElementById('main'));
  }
};

function renderGrammarQuizRun(main){
  const q = STATE.quizQuestions[STATE.quizIndex];
  const total = STATE.quizQuestions.length;
  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="q-head">
        <button class="back-link" id="backBtn" style="margin:0;">→ خروج</button>
        <span class="q-score">سؤال ${STATE.quizIndex+1} من ${total} · النقاط: ${STATE.quizScore}</span>
      </div>
      <div class="fc-progress"><i style="width:${(STATE.quizIndex/total)*100}%"></i></div>
      <div class="q-card" style="margin-top:16px;">
        <div class="q-type">اختر الإجابة الصحيحة</div>
        <div class="q-prompt en">${q.q}</div>
        <div class="opt-list" id="optList">
          ${q.opts.map((o,i)=>`<button class="opt en" data-i="${i}">${o}</button>`).join('')}
        </div>
        <div id="fb"></div>
        <div class="q-actions"><span></span><button class="btn btn-primary" id="nextQ" style="display:none;">${STATE.quizIndex===total-1?'إنهاء':'التالي'} ▶</button></div>
      </div>
    </div>
  `;
  main.querySelector('#backBtn').addEventListener('click', ()=>goto('grammar-detail',{gramId:STATE.gramId}));
  main.querySelectorAll('#optList .opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(STATE.quizAnswered) return;
      STATE.quizAnswered = true;
      const i = parseInt(btn.dataset.i);
      const correct = i===q.correctIndex;
      if(correct) STATE.quizScore++;
      main.querySelectorAll('#optList .opt').forEach((o,idx)=>{
        if(idx===q.correctIndex) o.classList.add('correct');
        else if(idx===i && !correct) o.classList.add('wrong');
      });
      const fb = main.querySelector('#fb');
      fb.innerHTML = `<div class="feedback ${correct?'ok':'bad'}">${correct?'✅ صحيح!':'❌ غير صحيح. الإجابة الصحيحة: '+q.opts[q.correctIndex]}</div>`;
      main.querySelector('#nextQ').style.display='block';
    });
  });
  main.querySelector('#nextQ').addEventListener('click', ()=>{
    if(STATE.quizIndex<total-1){ STATE.quizIndex++; STATE.quizAnswered=false; render(); }
    else{
      if(STATE.quizScore>=3 && !STATE.progress.gramDone.includes(STATE.gramId)){
        STATE.progress.gramDone.push(STATE.gramId); saveProgress();
      }
      goto('quiz-result-gram');
    }
  });
}

const _origRender2 = render;
render = function(){
  _origRender2.call(this);
  if(STATE.view==='quiz-result-gram'){
    const main = document.getElementById('main');
    const total = STATE.quizQuestions.length;
    const passed = STATE.quizScore>=3;
    main.innerHTML = `
      <div class="quiz-wrap">
        <div class="q-card result-card">
          <div style="font-size:44px;">${passed?'🎉':'💪'}</div>
          <div class="big">${STATE.quizScore}/${total}</div>
          <p>${passed?'أحسنت! أتقنت هذه القاعدة.':'حاول المراجعة مرة أخرى لإتقان القاعدة.'}</p>
          <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-ghost" id="retryG">إعادة الاختبار</button>
            <button class="btn btn-primary" id="backG">العودة للقواعد</button>
          </div>
        </div>
      </div>
    `;
    main.querySelector('#retryG').addEventListener('click', ()=>startGrammarQuiz(GRAMMAR.find(g=>g.id===STATE.gramId)));
    main.querySelector('#backG').addEventListener('click', ()=>goto('grammar'));
  }
};

loadProgress();
